<!doctype html><html><head><meta charset="utf-8"><title>Form controls</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<link rel="stylesheet" href="preview-theme.css?v=3">
<style>
  body{margin:0;padding:24px;background:var(--ads-bg-surface);font-family:var(--ads-font-sans);color:var(--ads-text-primary)}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .field{display:flex;flex-direction:column;gap:8px}
  .lbl{font-size:12px;line-height:16px;color:var(--ads-text-label)}
  .lbl .req{color:#D43F58;margin-left:2px}
  .input{height:44px;border-radius:4px;background:var(--ads-bg-muted);border:0;padding:0 16px;font-family:var(--ads-font-sans);font-size:14px;line-height:18px;color:var(--ads-text-strong);outline:none}
  .input::placeholder{color:var(--ads-border-strong)}
  .input.foc{background:var(--ads-bg-surface);outline:1px solid var(--ads-blue-500);outline-offset:1px;box-shadow:inset 0 0 0 1px var(--ads-border-default)}
  .input.err{background:var(--ads-bg-surface);outline:1px solid #D43F58;outline-offset:1px}
  .help{font-size:12px;line-height:16px;color:var(--ads-text-label)}
  .err-help{color:#D43F58}
</style></head><body>
<div class="row">
  <div class="field">
    <span class="lbl">Label</span>
    <input class="input" placeholder="Placeholder text">
    <span class="help">Optional helper text</span>
  </div>
  <div class="field">
    <span class="lbl">Label<span class="req">*</span></span>
    <input class="input foc" value="Typing here…">
    <span class="help">Focused state</span>
  </div>
  <div class="field">
    <span class="lbl">Label</span>
    <input class="input err" value="invalid value">
    <span class="help err-help">Please enter a valid value</span>
  </div>
</div>
<script src="preview-theme.js?v=2"></script>
<button class="pv-theme-toggle" type="button" data-mode="align-dark" aria-label="Switch to light mode" onclick="(function(b){try{var s='ads_theme::'+location.pathname.split('/').pop().replace(/\.html?$/,'');var c=localStorage.getItem(s)||'align-dark';var n=c==='align-dark'?'align-light':'align-dark';localStorage.setItem(s,n);document.documentElement.setAttribute('data-theme',n);b.setAttribute('data-mode',n);b.querySelector('.pv-lbl').textContent=n==='align-dark'?'Light':'Dark';b.setAttribute('aria-label',n==='align-dark'?'Switch to light mode':'Switch to dark mode');}catch(e){}})(this)"><svg class="pv-sun" viewBox="0 0 20 20"><circle cx="10" cy="10" r="3.5"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/><line x1="4.3" y1="4.3" x2="5.7" y2="5.7"/><line x1="14.3" y1="14.3" x2="15.7" y2="15.7"/><line x1="4.3" y1="15.7" x2="5.7" y2="14.3"/><line x1="14.3" y1="5.7" x2="15.7" y2="4.3"/></svg><svg class="pv-moon" viewBox="0 0 20 20"><path d="M 16 12.5 A 6.5 6.5 0 1 1 7.5 4 A 5.2 5.2 0 0 0 16 12.5 Z"/></svg><span class="pv-lbl">Light</span></button>
</body></html>
