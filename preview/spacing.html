<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<link rel="stylesheet" href="preview-theme.css?v=3">
<style>
  body{margin:0;padding:24px;background:var(--ads-bg-surface);font-family:var(--ads-font-sans);color:var(--ads-text-primary)}
  .row{display:grid;grid-template-columns:80px 1fr 80px;align-items:center;gap:12px;padding:6px 0}
  .tok{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--ads-text-primary)}
  .bar{height:16px;background:var(--ads-blue-500);border-radius:2px}
  .size{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ads-text-muted);text-align:right}
</style></head><body>
<div class="row"><span class="tok">space-1</span><div class="bar" style="width:4px"></div><span class="size">4px</span></div>
<div class="row"><span class="tok">space-2</span><div class="bar" style="width:8px"></div><span class="size">8px</span></div>
<div class="row"><span class="tok">space-3</span><div class="bar" style="width:12px"></div><span class="size">12px</span></div>
<div class="row"><span class="tok">space-4</span><div class="bar" style="width:16px"></div><span class="size">16px</span></div>
<div class="row"><span class="tok">space-5</span><div class="bar" style="width:20px"></div><span class="size">20px</span></div>
<div class="row"><span class="tok">space-6</span><div class="bar" style="width:24px"></div><span class="size">24px</span></div>
<div class="row"><span class="tok">space-8</span><div class="bar" style="width:32px"></div><span class="size">32px</span></div>
<div class="row"><span class="tok">space-10</span><div class="bar" style="width:40px"></div><span class="size">40px</span></div>
<div class="row"><span class="tok">space-16</span><div class="bar" style="width:64px"></div><span class="size">64px</span></div>
<script src="preview-theme.js?v=2"></script>
<button class="pv-theme-toggle" type="button" data-mode="align-dark" aria-label="Switch to light mode" onclick="(function(b){try{var s='ads_theme::'+location.pathname.split('/').pop().replace(/\.html?$/,'');var c=localStorage.getItem(s)||'align-dark';var n=c==='align-dark'?'align-light':'align-dark';localStorage.setItem(s,n);document.documentElement.setAttribute('data-theme',n);b.setAttribute('data-mode',n);b.querySelector('.pv-lbl').textContent=n==='align-dark'?'Light':'Dark';b.setAttribute('aria-label',n==='align-dark'?'Switch to light mode':'Switch to dark mode');}catch(e){}})(this)"><svg class="pv-sun" viewBox="0 0 20 20"><circle cx="10" cy="10" r="3.5"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/><line x1="4.3" y1="4.3" x2="5.7" y2="5.7"/><line x1="14.3" y1="14.3" x2="15.7" y2="15.7"/><line x1="4.3" y1="15.7" x2="5.7" y2="14.3"/><line x1="14.3" y1="5.7" x2="15.7" y2="4.3"/></svg><svg class="pv-moon" viewBox="0 0 20 20"><path d="M 16 12.5 A 6.5 6.5 0 1 1 7.5 4 A 5.2 5.2 0 0 0 16 12.5 Z"/></svg><span class="pv-lbl">Light</span></button>
</body></html>
