<!doctype html><html><head><meta charset="utf-8"><title>Buttons — Link / Ghost / Danger</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<link rel="stylesheet" href="preview-theme.css?v=3">
<style>
  body{margin:0;padding:24px;background:var(--ads-bg-surface);font-family:var(--ads-font-sans);color:var(--ads-text-primary)}
  .grid{display:grid;grid-template-columns:repeat(5,auto);gap:14px 12px;align-items:center;justify-content:start}
  .h{font-size:11px;color:var(--ads-text-muted);letter-spacing:.04em;text-transform:uppercase}
  .btn{display:inline-flex;align-items:center;justify-content:center;font-family:var(--ads-font-sans);font-size:14px;line-height:18px;height:44px;padding:0 16px;border-radius:4px;border:0;background:transparent;cursor:pointer}
  .link{color:var(--ads-blue-550)}
  .link.hov{color:var(--ads-blue-600);background:rgba(0,154,206,.06)}
  .link.pre{color:var(--ads-blue-700);background:rgba(0,154,206,.12)}
  .link.dis{color:var(--ads-text-disabled);cursor:not-allowed}
  .ghost{color:var(--ads-blue-550)}
  .ghost.hov{background:rgba(0,154,206,.08)}
  .ghost.pre{background:rgba(0,154,206,.16)}
  .ghost.dis{color:var(--ads-text-disabled);cursor:not-allowed}
  .dang{background:#CF2E38;color:var(--ads-bg-surface)}
  .dang.hov{background:#A21B23}
  .dang.pre{background:#760E13}
  .dang.dis{background:var(--ads-bg-muted);color:var(--ads-text-disabled);cursor:not-allowed}
</style></head><body>
<div class="grid">
  <div class="h">Link</div>
  <button class="btn link">Enabled</button>
  <button class="btn link hov">Hovered</button>
  <button class="btn link pre">Pressed</button>
  <button class="btn link dis">Disabled</button>

  <div class="h">Ghost</div>
  <button class="btn ghost">Enabled</button>
  <button class="btn ghost hov">Hovered</button>
  <button class="btn ghost pre">Pressed</button>
  <button class="btn ghost dis">Disabled</button>

  <div class="h">Danger</div>
  <button class="btn dang">Delete</button>
  <button class="btn dang hov">Delete</button>
  <button class="btn dang pre">Delete</button>
  <button class="btn dang dis">Delete</button>
</div>
<script src="preview-theme.js?v=2"></script>
<button class="pv-theme-toggle" type="button" data-mode="align-dark" aria-label="Switch to light mode" onclick="(function(b){try{var s='ads_theme::'+location.pathname.split('/').pop().replace(/\.html?$/,'');var c=localStorage.getItem(s)||'align-dark';var n=c==='align-dark'?'align-light':'align-dark';localStorage.setItem(s,n);document.documentElement.setAttribute('data-theme',n);b.setAttribute('data-mode',n);b.querySelector('.pv-lbl').textContent=n==='align-dark'?'Light':'Dark';b.setAttribute('aria-label',n==='align-dark'?'Switch to light mode':'Switch to dark mode');}catch(e){}})(this)"><svg class="pv-sun" viewBox="0 0 20 20"><circle cx="10" cy="10" r="3.5"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/><line x1="4.3" y1="4.3" x2="5.7" y2="5.7"/><line x1="14.3" y1="14.3" x2="15.7" y2="15.7"/><line x1="4.3" y1="15.7" x2="5.7" y2="14.3"/><line x1="14.3" y1="5.7" x2="15.7" y2="4.3"/></svg><svg class="pv-moon" viewBox="0 0 20 20"><path d="M 16 12.5 A 6.5 6.5 0 1 1 7.5 4 A 5.2 5.2 0 0 0 16 12.5 Z"/></svg><span class="pv-lbl">Light</span></button>
</body></html>
