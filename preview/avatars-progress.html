<!doctype html><html><head><meta charset="utf-8"><title>Avatars & Progress</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<link rel="stylesheet" href="preview-theme.css?v=3">
<style>
  body{margin:0;padding:24px;background:var(--ads-bg-surface);font-family:var(--ads-font-sans);color:var(--ads-text-primary)}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:32px}
  .h{font-size:11px;color:var(--ads-text-muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px}
  .row{display:flex;gap:12px;align-items:center}
  /* Avatar text must stay dark in BOTH themes because the gradient
     background is mode-invariant (pale blue → pale green). Using
     --ads-tag-blue-fg pins the color and keeps contrast in dark mode. */
  .av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:500;color:var(--ads-tag-blue-fg);background:linear-gradient(135deg,var(--ads-tag-blue-bg),#DCFCE8)}
  .av.xs{width:24px;height:24px;font-size:11px}
  .av.sm{width:32px;height:32px;font-size:12px}
  .av.md{width:40px;height:40px;font-size:14px}
  .av.lg{width:52px;height:52px;font-size:20px}
  .bar{height:8px;border-radius:4px;background:var(--ads-border-subtle);position:relative;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--ads-blue-500);border-radius:4px}
  .bar.err>i{background:#D43F58}
  .lbl{font-size:12px;color:var(--ads-text-muted);margin-bottom:6px}
  .hint{font-size:12px;color:var(--ads-text-subtle);margin-top:6px}
  .pcell{margin-bottom:12px}
</style></head><body>
<div class="split">
  <div>
    <div class="h">Avatar sizes</div>
    <div class="row">
      <span class="av xs">AD</span>
      <span class="av sm">AD</span>
      <span class="av md">AD</span>
      <span class="av lg">AD</span>
    </div>
  </div>
  <div>
    <div class="h">Progress</div>
    <div class="pcell"><div class="lbl">Case intake</div><div class="bar"><i style="width:25%"></i></div><div class="hint">Step 1 of 4</div></div>
    <div class="pcell"><div class="lbl">Scan processing</div><div class="bar"><i style="width:75%"></i></div><div class="hint">Almost done</div></div>
    <div class="pcell"><div class="lbl">Upload</div><div class="bar err"><i style="width:60%"></i></div><div class="hint" style="color:#D43F58">Upload failed — retry</div></div>
  </div>
</div>
<script src="preview-theme.js?v=2"></script>
<button class="pv-theme-toggle" type="button" data-mode="align-dark" aria-label="Switch to light mode" onclick="(function(b){try{var s='ads_theme::'+location.pathname.split('/').pop().replace(/\.html?$/,'');var c=localStorage.getItem(s)||'align-dark';var n=c==='align-dark'?'align-light':'align-dark';localStorage.setItem(s,n);document.documentElement.setAttribute('data-theme',n);b.setAttribute('data-mode',n);b.querySelector('.pv-lbl').textContent=n==='align-dark'?'Light':'Dark';b.setAttribute('aria-label',n==='align-dark'?'Switch to light mode':'Switch to dark mode');}catch(e){}})(this)"><svg class="pv-sun" viewBox="0 0 20 20"><circle cx="10" cy="10" r="3.5"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/><line x1="4.3" y1="4.3" x2="5.7" y2="5.7"/><line x1="14.3" y1="14.3" x2="15.7" y2="15.7"/><line x1="4.3" y1="15.7" x2="5.7" y2="14.3"/><line x1="14.3" y1="5.7" x2="15.7" y2="4.3"/></svg><svg class="pv-moon" viewBox="0 0 20 20"><path d="M 16 12.5 A 6.5 6.5 0 1 1 7.5 4 A 5.2 5.2 0 0 0 16 12.5 Z"/></svg><span class="pv-lbl">Light</span></button>
</body></html>
