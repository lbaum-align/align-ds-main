<!doctype html><html><head><meta charset="utf-8"><title>Colors — Core</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<link rel="stylesheet" href="preview-theme.css?v=3">
<style>
  body{margin:0;padding:20px;background:var(--ads-bg-surface);font-family:var(--ads-font-sans);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:4px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
  .chip{height:64px}
  .meta{padding:8px 10px}
  .name{font-size:12px;font-weight:500;color:var(--ads-text-primary);line-height:16px}
  .hex{font-size:11px;color:var(--ads-text-muted);line-height:14px;font-family:ui-monospace,Menlo,monospace;margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--ads-blue-500)"></div><div class="meta"><div class="name">Blue / Primary</div><div class="hex">var(--ads-blue-500)</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ads-blue-600)"></div><div class="meta"><div class="name">Blue / Hover</div><div class="hex">var(--ads-blue-600)</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ads-blue-700)"></div><div class="meta"><div class="name">Blue / Pressed</div><div class="hex">var(--ads-blue-700)</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ads-blue-550)"></div><div class="meta"><div class="name">Blue / Link</div><div class="hex">var(--ads-blue-550)</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ads-blue-text)"></div><div class="meta"><div class="name">Blue / Deep text</div><div class="hex">var(--ads-blue-text)</div></div></div>
</div>
<script src="preview-theme.js?v=2"></script>
<button class="pv-theme-toggle" type="button" data-mode="align-dark" aria-label="Switch to light mode" onclick="(function(b){try{var s='ads_theme::'+location.pathname.split('/').pop().replace(/\.html?$/,'');var c=localStorage.getItem(s)||'align-dark';var n=c==='align-dark'?'align-light':'align-dark';localStorage.setItem(s,n);document.documentElement.setAttribute('data-theme',n);b.setAttribute('data-mode',n);b.querySelector('.pv-lbl').textContent=n==='align-dark'?'Light':'Dark';b.setAttribute('aria-label',n==='align-dark'?'Switch to light mode':'Switch to dark mode');}catch(e){}})(this)"><svg class="pv-sun" viewBox="0 0 20 20"><circle cx="10" cy="10" r="3.5"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/><line x1="4.3" y1="4.3" x2="5.7" y2="5.7"/><line x1="14.3" y1="14.3" x2="15.7" y2="15.7"/><line x1="4.3" y1="15.7" x2="5.7" y2="14.3"/><line x1="14.3" y1="5.7" x2="15.7" y2="4.3"/></svg><svg class="pv-moon" viewBox="0 0 20 20"><path d="M 16 12.5 A 6.5 6.5 0 1 1 7.5 4 A 5.2 5.2 0 0 0 16 12.5 Z"/></svg><span class="pv-lbl">Light</span></button>
</body></html>
