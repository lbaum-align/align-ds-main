<!doctype html><html><head><meta charset="utf-8"><title>Checkbox / Radio / Toggle</title>
<link rel="stylesheet" href="../colors_and_type.css?v=5">
<link rel="stylesheet" href="preview-theme.css?v=3">
<style>
  body{margin:0;padding:24px;background:var(--ads-bg-surface);font-family:var(--ads-font-sans);color:var(--ads-text-primary)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .cell{display:flex;flex-direction:column;gap:12px}
  .h{font-size:11px;color:var(--ads-text-muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
  .opt{display:flex;align-items:center;gap:10px;font-size:14px;line-height:20px}
  /* checkbox */
  .cbx{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--ads-text-primary);background:var(--ads-bg-surface);display:inline-flex;align-items:center;justify-content:center}
  .cbx.on{background:var(--ads-blue-550);border-color:var(--ads-blue-550)}
  .cbx.on svg{stroke:var(--ads-bg-surface)}
  .cbx.ind{background:var(--ads-blue-550);border-color:var(--ads-blue-550)}
  /* radio */
  .rad{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--ads-text-primary);background:var(--ads-bg-surface);display:inline-flex;align-items:center;justify-content:center}
  .rad.on{border-color:var(--ads-blue-550)}
  .rad.on::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--ads-blue-550)}
  /* toggle */
  .tg{width:44px;height:28px;border-radius:28px;background:var(--ads-border-strong);position:relative;transition:background 150ms}
  .tg::after{content:"";position:absolute;left:2px;top:2px;width:24px;height:24px;border-radius:50%;background:var(--ads-bg-surface);transition:left 150ms}
  .tg.on{background:var(--ads-blue-500)}
  .tg.on::after{left:18px}
</style></head><body>
<div class="grid">
  <div class="cell">
    <div class="h">Checkbox</div>
    <label class="opt"><span class="cbx"></span> Unselected</label>
    <label class="opt"><span class="cbx on"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg></span> Selected</label>
    <label class="opt"><span class="cbx ind"><svg width="10" height="2" viewBox="0 0 10 2"><rect width="10" height="2" rx="1" fill="var(--ads-bg-surface)"/></svg></span> Indeterminate</label>
  </div>
  <div class="cell">
    <div class="h">Radio</div>
    <label class="opt"><span class="rad"></span> Option A</label>
    <label class="opt"><span class="rad on"></span> Option B (selected)</label>
    <label class="opt"><span class="rad" style="border-color:var(--ads-text-disabled)"></span> <span style="color:var(--ads-text-disabled)">Option C (disabled)</span></label>
  </div>
  <div class="cell">
    <div class="h">Toggle</div>
    <label class="opt"><span class="tg"></span> Off</label>
    <label class="opt"><span class="tg on"></span> On</label>
    <label class="opt"><span class="tg" style="background:var(--ads-border-default)"></span> <span style="color:var(--ads-text-disabled)">Disabled</span></label>
  </div>
</div>
<script src="preview-theme.js?v=2"></script>
<button class="pv-theme-toggle" type="button" data-mode="align-dark" aria-label="Switch to light mode" onclick="(function(b){try{var s='ads_theme::'+location.pathname.split('/').pop().replace(/\.html?$/,'');var c=localStorage.getItem(s)||'align-dark';var n=c==='align-dark'?'align-light':'align-dark';localStorage.setItem(s,n);document.documentElement.setAttribute('data-theme',n);b.setAttribute('data-mode',n);b.querySelector('.pv-lbl').textContent=n==='align-dark'?'Light':'Dark';b.setAttribute('aria-label',n==='align-dark'?'Switch to light mode':'Switch to dark mode');}catch(e){}})(this)"><svg class="pv-sun" viewBox="0 0 20 20"><circle cx="10" cy="10" r="3.5"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/><line x1="4.3" y1="4.3" x2="5.7" y2="5.7"/><line x1="14.3" y1="14.3" x2="15.7" y2="15.7"/><line x1="4.3" y1="15.7" x2="5.7" y2="14.3"/><line x1="14.3" y1="5.7" x2="15.7" y2="4.3"/></svg><svg class="pv-moon" viewBox="0 0 20 20"><path d="M 16 12.5 A 6.5 6.5 0 1 1 7.5 4 A 5.2 5.2 0 0 0 16 12.5 Z"/></svg><span class="pv-lbl">Light</span></button>
</body></html>
