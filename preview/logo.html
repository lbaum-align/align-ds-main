<style>
  body{margin:0;padding:24px;background:var(--ads-bg-surface);font-family:var(--ads-font-sans);color:var(--ads-text-primary)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px 12px;border-radius:4px;border:1px solid var(--ads-border-subtle);min-height:120px}
  .cell.dark{background:var(--ads-bg-inverse);border-color:var(--ads-bg-inverse);color:#fff}
  .cell.blue{background:var(--ads-blue-500);border-color:var(--ads-blue-500);color:#fff}
  .cell.surface{color:var(--ads-text-primary)}
  .cell svg{display:block;height:28px;width:auto;color:currentColor}
  .lbl{font-size:11px;color:var(--ads-text-muted);letter-spacing:.04em;text-transform:uppercase}
  .dark .lbl,.blue .lbl{color:rgba(255,255,255,.7)}
</style></head><body>
